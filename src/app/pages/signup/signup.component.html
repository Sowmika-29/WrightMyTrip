<section class="pt-32 pb-24 bg-black min-h-screen flex items-center justify-center">
  <div class="w-full max-w-md px-6">
    <div class="bg-[#111111] border border-white/5 p-10 rounded-[2rem] text-center">
      <h2 class="text-3xl font-bold mb-2">Create <span class="text-primary italic">Account</span></h2>
      <p class="text-gray-500 text-sm mb-10">Start your premium journey with us</p>
      
      <form class="space-y-6 text-left">
        <div class="space-y-2">
          <label class="text-xs uppercase tracking-widest text-gray-400 font-bold block">Full Name</label>
          <input type="text" placeholder="John Doe"
                 class="w-full bg-black border border-white/10 rounded-xl px-4 py-3 focus:border-primary transition-all outline-none">
        </div>
        <div class="space-y-2">
          <label class="text-xs uppercase tracking-widest text-gray-400 font-bold block">Email Address</label>
          <input type="email" placeholder="john&#64;example.com"
                 class="w-full bg-black border border-white/10 rounded-xl px-4 py-3 focus:border-primary transition-all outline-none">
        </div>
        <div class="space-y-2">
          <label class="text-xs uppercase tracking-widest text-gray-400 font-bold block">Password</label>
          <input type="password" placeholder="••••••••"
                 class="w-full bg-black border border-white/10 rounded-xl px-4 py-3 focus:border-primary transition-all outline-none">
        </div>
        <button type="submit" class="w-full py-4 bg-primary text-black font-black rounded-xl hover:bg-white transition-all transform hover:scale-[1.02] shadow-xl shadow-primary/20 uppercase tracking-widest">
          Create Account
        </button>
      </form>
      
      <p class="mt-8 text-sm text-gray-500">
        Already have an account? <a routerLink="/login" class="text-primary hover:underline">Login here</a>
      </p>
    </div>
  </div>
</section>
