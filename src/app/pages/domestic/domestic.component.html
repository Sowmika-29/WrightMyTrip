<app-navbar></app-navbar>

<main class="pt-32 pb-24 bg-black min-h-screen">
  <div class="max-w-[1400px] mx-auto px-4 sm:px-6 lg:px-8">
    
    <!-- Back Button -->
    <div class="mb-12">
      <a routerLink="/" class="text-primary hover:text-white transition-colors flex items-center space-x-2 text-sm font-bold uppercase tracking-widest group w-fit">
        <svg class="w-4 h-4 transform group-hover:-translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
        </svg>
        <span>Back to Home</span>
      </a>
    </div>

    <!-- Header -->
    <div class="text-center mb-16 space-y-4">
      <h1 class="text-5xl md:text-7xl font-black uppercase tracking-tighter">
        Domestic <span class="text-primary italic">Wonders</span>
      </h1>
      <p class="text-gray-400 text-xl font-medium max-w-2xl mx-auto">
        Explore the best destinations within India
      </p>
    </div>

    <!-- Grid -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
      <app-trip-card *ngFor="let trip of trips" [trip]="trip"></app-trip-card>
    </div>
  </div>
</main>

<app-footer></app-footer>
