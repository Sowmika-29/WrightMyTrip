<section class="pt-32 pb-24 bg-black min-h-screen">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="mb-16">
      <h1 class="text-5xl font-black mb-4 tracking-tighter">INTERNATIONAL <span class="text-primary italic">ESCAPES</span></h1>
      <p class="text-gray-400 max-w-2xl text-lg">From the skylines of Dubai to the paradise of Bali, explore the worlds most iconic destinations with Wright My Trip.</p>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
      <app-trip-card *ngFor="let trip of trips" [trip]="trip"></app-trip-card>
    </div>
  </div>
</section>
