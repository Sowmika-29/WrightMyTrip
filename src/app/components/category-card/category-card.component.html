<div [routerLink]="link" 
     class="group relative h-[400px] w-full rounded-3xl overflow-hidden cursor-pointer shadow-2xl transition-all duration-700 hover:shadow-primary/20">
  
  <!-- Background Image -->
  <img [src]="image" [alt]="title" 
       class="absolute inset-0 w-full h-full object-cover transition-transform duration-1000 group-hover:scale-110">
  
  <!-- Dynamic Overlays -->
  <div class="absolute inset-0 bg-gradient-to-t from-black via-black/40 to-transparent group-hover:via-black/20 transition-all duration-500"></div>
  <div class="absolute inset-0 bg-primary/10 opacity-0 group-hover:opacity-100 transition-opacity duration-700"></div>

  <!-- Content -->
  <div class="absolute bottom-0 left-0 w-full p-10 space-y-4 translate-y-4 group-hover:translate-y-0 transition-transform duration-500">
    <div class="flex items-center space-x-3 mb-2">
      <span class="w-10 h-[2px] bg-primary group-hover:w-16 transition-all duration-500"></span>
      <span class="text-primary font-black uppercase tracking-[0.3em] text-[10px]">Explore</span>
    </div>
    
    <h3 class="text-5xl font-black text-white tracking-tighter leading-none group-hover:text-primary transition-colors">
      {{ title }}
    </h3>
    
    <p class="text-gray-300 text-lg font-medium opacity-0 group-hover:opacity-100 transition-all duration-700 delay-100 max-w-sm">
      {{ description }}
    </p>

    <!-- Arrow CTA -->
    <div class="flex items-center text-primary font-bold pt-4 opacity-0 group-hover:opacity-100 transition-all duration-700 delay-200">
      <span class="text-sm tracking-widest uppercase">Select Category</span>
      <svg class="w-6 h-6 ml-4 transform group-hover:translate-x-2 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3"/>
      </svg>
    </div>
  </div>

  <!-- Decorative Border -->
  <div class="absolute inset-0 border border-white/5 rounded-3xl group-hover:border-primary/40 transition-colors pointer-events-none"></div>
</div>
