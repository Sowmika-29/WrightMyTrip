<section class="relative h-screen w-full overflow-hidden" (mouseenter)="stopAutoSlide()" (mouseleave)="startAutoSlide()">
  <!-- Slides -->
  <div class="absolute inset-0 transition-opacity duration-1000 ease-in-out" 
       *ngFor="let slide of images; let i = index"
       [ngClass]="{'opacity-100 z-10': currentIndex === i, 'opacity-0 z-0': currentIndex !== i}">
    
    <div class="absolute inset-0 bg-black/40 z-20"></div>
    <img [src]="slide.url" [alt]="slide.title" class="w-full h-full object-cover">

    <!-- Content -->
    <div class="absolute inset-0 z-30 flex flex-col items-center justify-center text-center px-4">
      <h3 class="text-primary text-lg md:text-xl font-medium tracking-widest uppercase mb-4 animate-in fade-in slide-in-from-bottom duration-700">
        {{ slide.title }}
      </h3>
      <h1 class="text-4xl md:text-7xl font-bold text-white mb-6 tracking-tighter drop-shadow-2xl animate-in fade-in slide-in-from-bottom duration-1000">
        {{ slide.subtitle }}
      </h1>
      <p class="text-gray-200 text-lg md:text-xl max-w-2xl mb-10 animate-in fade-in slide-in-from-bottom duration-1000 delay-300">
        {{ slide.description }}
      </p>
      
      <div class="flex flex-col md:flex-row space-y-4 md:space-y-0 md:space-x-6 animate-in fade-in slide-in-from-bottom duration-1000 delay-500">
        <button routerLink="/contact" class="px-10 py-4 bg-primary text-black font-bold rounded-full hover:bg-white transition-all transform hover:scale-105 shadow-lg shadow-primary/20">
          BOOK NOW
        </button>
        <button routerLink="/contact" class="px-10 py-4 bg-white/10 backdrop-blur-md border border-white/20 text-white font-bold rounded-full hover:bg-white/20 transition-all">
          CONTACT US
        </button>
      </div>
    </div>
  </div>

  <!-- Indicators -->
  <div class="absolute bottom-10 left-1/2 -translate-x-1/2 z-40 flex space-x-3">
    <button *ngFor="let slide of images; let i = index" 
            (click)="goToSlide(i)"
            class="w-3 h-3 rounded-full transition-all duration-300"
            [ngClass]="currentIndex === i ? 'bg-primary w-10' : 'bg-white/30 hover:bg-white/50'">
    </button>
  </div>

  <!-- Navigation Arrows -->
  <button (click)="prevSlide()" class="absolute left-6 top-1/2 -translate-y-1/2 z-40 p-2 text-white/50 hover:text-primary transition-colors hidden md:block">
    <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
  </button>
  <button (click)="nextSlide()" class="absolute right-6 top-1/2 -translate-y-1/2 z-40 p-2 text-white/50 hover:text-primary transition-colors hidden md:block">
    <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
  </button>
</section>
