<div class="fixed bottom-8 right-8 z-[100] font-sans">
  
  <!-- Chat Window -->
  <div *ngIf="isOpen" 
       class="absolute bottom-20 right-0 w-[350px] h-[500px] bg-[#111111] border border-primary/20 rounded-3xl shadow-2xl flex flex-col overflow-hidden animate-in slide-in-from-bottom duration-300">
    
    <!-- Header -->
    <div class="bg-primary p-6 flex justify-between items-center text-black">
      <div>
        <h3 class="font-black uppercase tracking-widest text-sm">Wright Assistant</h3>
        <p class="text-[10px] font-bold opacity-60">Online • Always here for you</p>
      </div>
      <button (click)="toggleChat()" class="hover:scale-110 transition-transform">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>

    <!-- Messages Area -->
    <div class="flex-1 overflow-y-auto p-6 space-y-4 bg-black/40">
      <div *ngFor="let msg of messages" 
           [ngClass]="msg.isUser ? 'ml-auto' : 'mr-auto'"
           class="max-w-[80%]">
        <div [ngClass]="msg.isUser ? 'bg-primary text-black rounded-tr-none' : 'bg-[#222222] text-gray-300 rounded-tl-none'"
             class="p-4 rounded-2xl text-sm font-medium shadow-sm">
          {{ msg.text }}
        </div>
        <span class="text-[8px] text-gray-600 mt-1 block px-1 uppercase tracking-tighter" [ngClass]="msg.isUser ? 'text-right' : 'text-left'">
          {{ msg.time | date:'shortTime' }}
        </span>
      </div>
    </div>

    <!-- Input Area -->
    <form (ngSubmit)="sendMessage()" class="p-4 bg-black border-t border-white/5 flex items-center space-x-2">
      <input type="text" [(ngModel)]="userInput" name="chatInput"
             placeholder="Type your message..." 
             class="flex-1 bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-sm text-white focus:border-primary outline-none transition-all">
      <button type="submit" 
              class="w-10 h-10 bg-primary rounded-xl flex items-center justify-center text-black hover:bg-white transition-all transform active:scale-95">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 12h14M12 5l7 7-7 7"/></svg>
      </button>
    </form>
  </div>

  <!-- Toggle Button -->
  <button (click)="toggleChat()"
          class="w-16 h-16 bg-primary rounded-full shadow-2xl flex items-center justify-center text-black hover:scale-110 transition-all duration-300 group relative">
    <div class="absolute inset-0 bg-primary rounded-full animate-ping opacity-20 group-hover:hidden"></div>
    <svg *ngIf="!isOpen" class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/></svg>
    <svg *ngIf="isOpen" class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
  </button>

</div>
