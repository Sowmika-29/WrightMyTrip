<div class="space-y-12">
  <!-- Results Info -->
  <div class="flex justify-between items-center border-b border-white/5 pb-6">
    <div class="flex items-center space-x-3">
      <span class="w-2 h-8 bg-primary rounded-full"></span>
      <h3 class="text-xl font-bold uppercase tracking-wider">
        <span class="text-primary">{{ trips.length }}</span> Results Found
      </h3>
    </div>
    <div *ngIf="trips.length === 0" class="text-gray-500 text-sm italic">
      No adventures match your search...
    </div>
  </div>

  <!-- Grid -->
  <div *ngIf="trips.length > 0; else emptyState" 
       class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8 animate-in fade-in slide-in-from-bottom duration-700">
    <app-trip-card *ngFor="let trip of trips" [trip]="trip"></app-trip-card>
  </div>

  <!-- Empty State -->
  <ng-template #emptyState>
    <div class="py-24 text-center bg-[#0a0a0a] rounded-[3rem] border border-white/5 space-y-6">
      <div class="text-7xl">🔭</div>
      <div class="space-y-2">
        <h3 class="text-2xl font-bold">No Destinations Found</h3>
        <p class="text-gray-400 max-w-md mx-auto">We couldn't find any trips matching your filters. Try adjusting your preferences.</p>
      </div>
      <button (click)="onClearFilters()" 
              class="px-10 py-4 bg-primary text-black font-black rounded-full hover:bg-white transition-all transform hover:scale-105 shadow-xl shadow-primary/20">
        RESET ALL FILTERS
      </button>
    </div>
  </ng-template>
</div>
