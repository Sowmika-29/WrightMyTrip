<div [routerLink]="['/trip', trip.id]" 
     class="group relative bg-[#111111] border border-white/5 rounded-2xl overflow-hidden cursor-pointer hover:border-primary/40 transition-all duration-500 hover:shadow-2xl hover:shadow-primary/10">
  
  <!-- Image Container -->
  <div class="relative h-64 overflow-hidden">
    <img [src]="trip.image" [alt]="trip.name" 
         class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110">
    
    <!-- Badges -->
    <div class="absolute top-4 left-4 flex flex-col space-y-2 z-10">
      <div class="bg-primary text-black px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-tighter w-fit">
        {{ trip.durationDays }} Days
      </div>
      <div class="bg-white/20 backdrop-blur-md text-white px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-tighter w-fit border border-white/10">
        {{ trip.type }}
      </div>
    </div>

    <!-- Price Badge -->
    <div class="absolute top-4 right-4 bg-black/80 backdrop-blur-md px-4 py-2 rounded-2xl border border-primary/30 z-10 transition-all group-hover:bg-primary group-hover:text-black">
      <span class="text-[8px] uppercase block leading-none font-bold opacity-60">Starting at</span>
      <span class="font-black text-lg">₹{{ startingPrice | number }}</span>
    </div>

    <!-- Hover Overlay -->
    <div class="absolute inset-0 bg-gradient-to-t from-black via-transparent to-transparent opacity-60"></div>
  </div>

  <!-- Content -->
  <div class="p-6 space-y-3">
    <div class="flex justify-between items-start">
      <div>
        <span class="text-[10px] tracking-widest uppercase text-primary font-bold">{{ trip.type }}</span>
        <h3 class="text-xl font-bold text-white group-hover:text-primary transition-colors">{{ trip.name }}</h3>
      </div>
    </div>
    
    <p class="text-gray-400 text-sm line-clamp-2 leading-relaxed">
      {{ trip.description }}
    </p>

    <!-- CTA -->
    <div class="pt-4 flex items-center text-sm font-bold text-primary group-hover:translate-x-2 transition-transform">
      VIEW DETAILS 
      <svg class="w-4 h-4 ml-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3"/></svg>
    </div>
  </div>
</div>
